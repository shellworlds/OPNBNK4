# Enables Dependabot version updates (shows under Insights → Dependency graph; opens PRs).
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/backend/account-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/backend/transaction-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/backend/openbanking-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/backend/api-gateway"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/backend/fraud-detection-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/backend/core-simulator"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/backend/notification-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/frontend/web-portal"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/frontend/mobile-app"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
