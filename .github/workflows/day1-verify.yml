name: Day 1 verify (manual)

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Also run Docker Compose E2E smoke (slow)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backend-frontend-tests:
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Gradle tests (all services)
        run: |
          for s in account-service transaction-service openbanking-service api-gateway; do
            echo "== $s =="
            (cd backend/$s && chmod +x gradlew && ./gradlew test --no-daemon)
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web-portal/package-lock.json

      - name: npm test + build
        working-directory: frontend/web-portal
        run: |
          npm ci
          npm test -- --watchAll=false
          npm run build

  optional-e2e-smoke:
    if: github.event.inputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    needs: [backend-frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Compose + smoke
        run: |
          docker compose up -d --build
          python3 infrastructure/scripts/smoke-e2e.py --gateway http://localhost:8080
      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
