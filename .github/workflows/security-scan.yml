name: Security scan (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  trivy-image-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build gateway image
        run: docker build -t opnbnk4-gateway:scan -f backend/api-gateway/Dockerfile ./backend/api-gateway
      - name: Trivy image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: opnbnk4-gateway:scan
          severity: CRITICAL,HIGH
          exit-code: "0"
