name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - transaction-service
          - openbanking-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Build and test
        working-directory: backend/${{ matrix.service }}
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          chmod +x gradlew
          ./gradlew test bootJar --no-daemon

  react-web-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web-portal/package-lock.json

      - name: Install and test
        working-directory: frontend/web-portal
        run: |
          npm ci
          npm test -- --watchAll=false

      - name: Production build
        working-directory: frontend/web-portal
        run: npm run build

  docker-validate:
    runs-on: ubuntu-latest
    needs: [java-services, react-web-portal]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images (no push)
        run: |
          docker build -t dbp-account:ci ./backend/account-service
          docker build -t dbp-transaction:ci ./backend/transaction-service
          docker build -t dbp-openbanking:ci ./backend/openbanking-service
          docker build -t dbp-gateway:ci ./backend/api-gateway
          docker build -t dbp-web:ci ./frontend/web-portal

  e2e-open-data-smoke:
    runs-on: ubuntu-latest
    needs: [docker-validate]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for gateway and run open-data smoke
        run: |
          python3 infrastructure/scripts/smoke-e2e.py --gateway http://localhost:8080

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
