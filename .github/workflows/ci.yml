name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - transaction-service
          - openbanking-service
          - api-gateway
          - fraud-detection-service
          - core-simulator
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Build and test
        working-directory: backend/${{ matrix.service }}
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          chmod +x gradlew
          ./gradlew test bootJar --no-daemon

  java-postgres-integration:
    runs-on: ubuntu-latest
    needs: [java-services]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Run Postgres Testcontainers integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          set -e
          for svc in account-service transaction-service openbanking-service; do
            echo "==> $svc Postgres IT"
            (cd "backend/$svc" && chmod +x gradlew && ./gradlew test --tests '*Postgres*IntegrationTest' --no-daemon)
          done

  react-web-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web-portal/package-lock.json

      - name: Install and test
        working-directory: frontend/web-portal
        run: |
          npm ci
          npm test -- --watchAll=false

      - name: Production build
        working-directory: frontend/web-portal
        run: npm run build

  docker-validate:
    runs-on: ubuntu-latest
    needs: [java-services, java-postgres-integration, react-web-portal]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images (no push)
        run: |
          docker build -f backend/account-service/Dockerfile -t dbp-account:ci backend
          docker build -f backend/transaction-service/Dockerfile -t dbp-transaction:ci backend
          docker build -t dbp-openbanking:ci ./backend/openbanking-service
          docker build -t dbp-gateway:ci ./backend/api-gateway
          docker build -t dbp-core:ci ./backend/core-simulator
          docker build -f backend/fraud-detection-service/Dockerfile -t dbp-fraud:ci backend
          docker build -f backend/notification-service/Dockerfile -t dbp-notify:ci backend
          docker build -t dbp-web:ci ./frontend/web-portal

  e2e-open-data-smoke:
    runs-on: ubuntu-latest
    needs: [docker-validate]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for gateway and run open-data smoke
        run: |
          python3 infrastructure/scripts/smoke-e2e.py --gateway http://localhost:8080

      - name: Set up Node.js (Playwright API E2E)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Playwright API E2E
        working-directory: tests/e2e
        env:
          E2E_GATEWAY_URL: http://localhost:8080
          SKIP_WEB_E2E: "true"
        run: |
          npm ci
          npx playwright install --with-deps
          npm run test:api

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
