name: Day 4 verify (manual)

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Also run Docker Compose E2E smoke + Playwright"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_security:
        description: "Run Trivy filesystem scan on repo"
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backend-frontend-tests:
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Gradle tests (all backend services)
        run: |
          for s in account-service transaction-service openbanking-service api-gateway fraud-detection-service core-simulator notification-service; do
            echo "== $s =="
            (cd backend/$s && chmod +x gradlew && ./gradlew test --no-daemon)
          done

      - name: Postgres Testcontainers integration tests
        run: |
          set -e
          for svc in account-service transaction-service openbanking-service; do
            echo "==> $svc Postgres IT"
            (cd "backend/$svc" && chmod +x gradlew && ./gradlew test --tests '*Postgres*IntegrationTest' --no-daemon)
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web-portal/package-lock.json

      - name: npm test + build (web portal)
        working-directory: frontend/web-portal
        run: |
          npm ci
          npm test -- --watchAll=false
          npm run build

  trivy-fs:
    if: github.event.inputs.run_security == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"

  optional-compose-e2e:
    if: github.event.inputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    needs: [backend-frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Compose + smoke + Playwright API
        run: |
          docker compose up -d --build
          python3 infrastructure/scripts/smoke-e2e.py --gateway http://localhost:8080
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Playwright API E2E
        working-directory: tests/e2e
        env:
          E2E_GATEWAY_URL: http://localhost:8080
          SKIP_WEB_E2E: "true"
        run: |
          npm ci
          npx playwright install --with-deps
          npm run test:api
      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
