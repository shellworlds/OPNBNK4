server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accounts;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: account-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# OAuth2: set issuer in docker profile (Keycloak). Empty = permit all for local dev/tests.
spring.security.oauth2.resourceserver.jwt.issuer-uri: ${KEYCLOAK_ISSUER_URI:}

spring.cache.type: ${SPRING_CACHE_TYPE:none}

core:
  integration:
    enabled: ${CORE_INTEGRATION_ENABLED:false}
    base-url: ${CORE_INTEGRATION_BASE_URL:http://localhost:8087}

resilience4j:
  circuitbreaker:
    instances:
      coreSimulator:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s

day2:
  kafka:
    consumer:
      enabled: ${DAY2_KAFKA_CONSUMER_ENABLED:false}
    topics:
      transaction-completed: bank.transaction.completed

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
