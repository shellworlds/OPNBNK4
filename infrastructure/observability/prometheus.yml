global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - account-service:8081
          - transaction-service:8082
          - openbanking-service:8083
          - core-simulator:8087
          - fraud-detection-service:8088
          - notification-service:8080
